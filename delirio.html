<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delírio — Deli</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0e0c;--surface:#1a1917;--surface2:#242220;--border:#2e2c29;--accent:#e8c547;--accent2:#d4a843;--text:#f0ede8;--text2:#9a9690;--text3:#5a5752;--green:#4caf7d;--red:#e05c4b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-weight:300;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .logo{display:flex;align-items:baseline;gap:2px}
  .logo-deli{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:var(--text2)}
  .logo-rio{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:12px}
  .filial-selector{display:flex;gap:6px}
  .filial-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;font-weight:400;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all 0.15s;letter-spacing:.5px}
  .filial-btn:hover{border-color:var(--accent);color:var(--accent)}
  .filial-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:500}
  .filial-btn.multi{border-style:dashed}
  .filial-btn.multi.active{background:transparent;color:var(--accent)}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .config-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:16px;align-items:center;flex-shrink:0;font-size:11px;flex-wrap:wrap}
  .config-item{display:flex;align-items:center;gap:8px}
  .config-item label{color:var(--text3);letter-spacing:.5px}
  .config-item input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:4px 8px;border-radius:3px}
  .config-item input:focus{outline:none;border-color:var(--accent)}
  .key-input{width:320px}
  .sync-btn{background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
  .sync-btn:hover{border-color:var(--accent);color:var(--accent)}
  .sync-btn:disabled{opacity:.4;cursor:not-allowed}
  .sync-status{font-size:11px;color:var(--text3)}
  .messages{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .message{display:flex;gap:14px;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user{flex-direction:row-reverse}
  .avatar{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
  .avatar.ai{background:var(--accent);color:var(--bg);font-family:'Instrument Serif',serif;font-style:italic;font-weight:600}
  .avatar.user-av{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:11px;font-family:'DM Mono',monospace}
  .bubble{max-width:72%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;font-size:13.5px;line-height:1.7;color:var(--text)}
  .message.user .bubble{background:var(--surface2);color:var(--text2)}
  .bubble p{margin-bottom:8px}
  .bubble p:last-child{margin-bottom:0}
  .bubble .highlight{color:var(--accent);font-weight:500}
  .filial-tag{display:inline-block;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:2px 7px;border-radius:3px;margin-bottom:10px;letter-spacing:.5px}
  .chart-container{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px}
  .chart-title{font-size:11px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px}
  .thinking{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;padding:4px 0}
  .thinking-dots{display:flex;gap:4px}
  .thinking-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dot-bounce 1.2s infinite}
  .thinking-dots span:nth-child(2){animation-delay:.2s}
  .thinking-dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot-bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  .input-area{padding:16px 28px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .input-row{display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13.5px;font-weight:300;padding:12px 16px;border-radius:6px;resize:none;min-height:48px;max-height:140px;line-height:1.5;transition:border-color .15s}
  textarea::placeholder{color:var(--text3)}
  textarea:focus{outline:none;border-color:var(--accent)}
  .send-btn{width:48px;height:48px;background:var(--accent);border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .send-btn:hover{background:var(--accent2)}
  .send-btn:disabled{opacity:.4;cursor:not-allowed}
  .send-btn svg{width:18px;height:18px}
  .suggestions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .suggestion{background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
  .suggestion:hover{border-color:var(--accent);color:var(--accent)}
  .welcome{text-align:center;padding:40px 20px;animation:fadeIn .5s ease}
  .welcome-logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:52px;margin-bottom:8px}
  .welcome-logo span:first-child{color:var(--text2)}
  .welcome-logo span:last-child{color:var(--accent)}
  .welcome-sub{color:var(--text3);font-size:12px;letter-spacing:1px;margin-bottom:32px}
  .welcome-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:700px;margin:0 auto}
  .welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:left;max-width:210px;cursor:pointer;transition:all .2s}
  .welcome-card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .welcome-card-icon{font-size:18px;margin-bottom:8px}
  .welcome-card-title{font-size:12px;color:var(--text);margin-bottom:4px;font-weight:500}
  .welcome-card-desc{font-size:11px;color:var(--text3);line-height:1.5}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

      </div>
      <div class="welcome-card" onclick="sendSuggestion('Qual foi meu ticket médio por horário hoje? Gere um gráfico.')">
        <div class="welcome-card-icon">🕐</div>
        <div class="welcome-card-title">Ticket por hora</div>

<div class="input-area">

    <button class="suggestion" onclick="sendSuggestion('Top 10 produtos dessa semana')">top produtos</button>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const SUPABASE_URL='https://qvxdxqdoloqmsdddapad.supabase.co';
const SUPABASE_KEY='sb_publishable_BU4_KOq9mHrmbd4qjHn3Sg_jbhsK9VB';
const CLOUDFY={AccKey:'b2ecb1899e65479b9a1da8ded1fe3044',TokenKey:'8edee9377a254613b0f884cbbe12d1f68cc67bce64f54aaca4aaba52bc2f821bd4973f3d86364a3098bfcd7c4fbec21c89d61d0cb752412c9454e9b84b4729e6',LoginUsr:'integracao.queamais',NomeUsr:'INTEGRACAO DELI'};
const FILIAIS={551:{nome:'Deli Itacorubi',codFilial:1,sigla:'DLIT'},645:{nome:'Deli Acate',codFilial:1,sigla:'DLAC'},677:{nome:'Deli Centro',codFilial:1,sigla:'DLVD'}};
const FILIAIS_IDS=[551,645,677];
let selectedFilial=551,isLoading=false,chartInstances={};
document.getElementById('dataBase').value=new Date().toISOString().split('T')[0];

function selectFilial(f,btn){selectedFilial=f;document.querySelectorAll('.filial-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function dateToCloudfy(d){return parseInt(d.replace(/-/g,''))}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]}
function padTime(t){const s=String(t).padStart(4,'0');return s.slice(0,2)+':'+s.slice(2,4)}

async function sbFetch(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'}});
  return r.json();
}
async function sbInsert(table,data){
  return fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify(data)});
}

async function syncData(){
  const btn=document.getElementById('syncBtn');
  const status=document.getElementById('syncStatus');
  const dataBase=document.getElementById('dataBase').value;
  btn.disabled=true;status.textContent='sincronizando...';
  const filiais=selectedFilial==='all'?FILIAIS_IDS:[selectedFilial];
  let totalC=0,totalI=0;
  try{
    for(const cod of filiais){
      status.textContent=`buscando ${FILIAIS[cod].sigla}...`;
      const body={Parameters:{AccKey:CLOUDFY.AccKey,TokenKey:CLOUDFY.TokenKey,ApiName:'CFYCC870',Data:{Solicitante:{LoginUsr:CLOUDFY.LoginUsr,NomeUsr:CLOUDFY.NomeUsr,CodEmpresa:cod,CodFilial:FILIAIS[cod].codFilial},Filtros:{DataInicio:dateToCloudfy(dataBase),DataFim:dateToCloudfy(dataBase),SituacaoCupom:1,IdentifDesconto:1,IdentifTaxaServico:1,IdentifConsultaProd:1,IdentifConsultaFormaPagto:1,IdentifConsultaProdCancelados:2}}}};
      const resp=await fetch('/api/cloudfy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const json=await resp.json();
      const cupons=json?.Parameters?.Data?.Resultado?.CuponsVenda||[];
      if(!cupons.length){status.textContent=`${FILIAIS[cod].sigla}: sem dados`;continue;}
      const cuponsRows=cupons.map(c=>({nr_empresa:cod,nr_filial:1,nr_cupom:c.NrCupom,nr_caixa:c.NrCaixa,data_movimento:dataBase,hr_abertura:c.HrAbertura?padTime(c.HrAbertura):null,hr_fechamento:c.HrFechamento?padTime(c.HrFechamento):null,qtde_itens:c.QtdeItens||0,qtde_produtos:c.QtdeProdutos||0,vlr_subtotal:c.VlrSubTotalProdutos||0,vlr_descontos:c.VlrDescontos||0,vlr_acrescimos:c.VlrAcrescimos||0,vlr_total:c.VlrTotal||0,vlr_pago:c.VlrPago||0,tp_venda:c.TpVenda,qtde_clientes:c.QtdeClientes||1,situacao_cupom:c.SituacaoCupom,desc_situacao:c.DescSituacao,setor:c.Setor}));
      await sbInsert('cupons',cuponsRows);totalC+=cuponsRows.length;
      const prods=[],pags=[];
      for(const c of cupons){
        if(c.Produtos){const ps=Array.isArray(c.Produtos)?c.Produtos:[c.Produtos];for(const p of ps)prods.push({nr_empresa:cod,nr_filial:1,nr_cupom:c.NrCupom,data_movimento:dataBase,nr_item:p.NrItem,cod_produto:p.CodProduto,cod_ref_produto:p.CodRefProduto,desc_produto:p.DescProduto,cod_grupo:p.CodGrupo,desc_grupo:p.DescGrupo,unidade:p.Unidade,vlr_unitario:p.VlrUnitario||0,qtde:p.Qtde||0,sub_total:p.SubTotal||0,vlr_descontos:p.VlrDescontos||0,vlr_acrescimos:p.VlrAcrescimos||0,vlr_total:p.VlrTotal||0,vlr_total_liq:p.VlrTotalLiq||0,nr_mesa_comanda:p.NrMesaComanda,data_hora_lancamento:p.DataHoraLancamento,nome_vendedor:p.NomeUsuarioVendedor,situacao_item:p.SituacaoItem,desc_situacao_item:p.DescSituacaoItem})}
        if(c.Pagamentos){const ps=Array.isArray(c.Pagamentos)?c.Pagamentos:[c.Pagamentos];for(const p of ps)pags.push({nr_empresa:cod,nr_filial:1,nr_cupom:c.NrCupom,data_movimento:dataBase,nr_seq_pagto:p.NrSeqPagto,tipo_pagto:p.TipoPagto,desc_forma_pagamento:p.DescFormaPagamento,cod_forma_pagamento:p.CodFormaPagamento,vlr_pago:p.VlrPago||0,data_pagto:dataBase,nome_adquirente:p.NomeAdiquirente})}
      }
      if(prods.length){await sbInsert('cupom_produtos',prods);totalI+=prods.length;}
      if(pags.length)await sbInsert('cupom_pagamentos',pags);
      await sbInsert('sync_log',[{nr_empresa:cod,nr_filial:1,data_sync:dataBase,status:'ok',qtde_cupons:cuponsRows.length,qtde_itens:prods.length}]);
    }
    status.textContent=`✓ ${totalC} vendas, ${totalI} itens salvos`;
  }catch(err){status.textContent=`erro: ${err.message}`;}
  btn.disabled=false;
}

async function getDados(pergunta){
  const dataBase=document.getElementById('dataBase').value;
  const p=pergunta.toLowerCase();
  let di=dataBase,df=dataBase;
  if(p.includes('semana'))di=daysAgo(7);
  else if(p.includes('mês')||p.includes('mes'))di=daysAgo(30);
  else if(p.includes('ontem')){di=daysAgo(1);df=daysAgo(1);}
  const ef=selectedFilial==='all'?`nr_empresa=in.(${FILIAIS_IDS.join(',')})`:`nr_empresa=eq.${selectedFilial}`;
  const df2=`data_movimento=gte.${di}&data_movimento=lte.${df}`;
  const [cupons,produtos,pagamentos]=await Promise.all([
    sbFetch('cupons',`${ef}&${df2}&order=data_movimento.desc,hr_abertura.asc&limit=500`),
    sbFetch('cupom_produtos',`${ef}&${df2}&limit=2000`),
    sbFetch('cupom_pagamentos',`${ef}&${df2}&limit=1000`)
  ]);
  return{cupons:cupons||[],produtos:produtos||[],pagamentos:pagamentos||[],periodo:{di,df}};
}

async function askClaude(pergunta,dados){
  const key=document.getElementById('claudeKey').value.trim();
  if(!key)throw new Error('Configure sua chave Claude no topo da tela.');
  const filialNome=selectedFilial==='all'?'TODAS AS FILIAIS':FILIAIS[selectedFilial].nome;
  const sys=`Você é o Delírio, assistente de inteligência comercial da Deli (rede de restaurantes em Florianópolis). Filiais: Deli Itacorubi (551), Deli Acate (645), Deli Centro (677).
Responda em português, de forma direta. Use R$ para valores. Para gráficos use: ###CHART###{"type":"bar","labels":[...],"datasets":[{"label":"...","data":[...]}],"title":"..."}###ENDCHART###
Use **texto** para destacar números importantes. Se dados estiverem vazios, oriente a sincronizar primeiro.`;
  const msg=`PERGUNTA: ${pergunta}\nFILIAL: ${filialNome}\nPERÍODO: ${dados.periodo.di} a ${dados.periodo.df}\n\nCUPONS(${dados.cupons.length}):\n${JSON.stringify(dados.cupons.slice(0,100),null,1)}\n\nPRODUTOS(${dados.produtos.length}):\n${JSON.stringify(dados.produtos.slice(0,200),null,1)}\n\nPAGAMENTOS(${dados.pagamentos.length}):\n${JSON.stringify(dados.pagamentos.slice(0,100),null,1)}`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:[{role:'user',content:msg}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content[0].text;
}

function renderResponse(text,filialInfo){
  const parts=text.split('###CHART###');
  let html=`<div class="filial-tag">${filialInfo}</div>`;
  for(let i=0;i<parts.length;i++){
    if(i%2===0){
      const f=parts[i].replace(/\*\*(.*?)\*\*/g,'<strong class="highlight">$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
      html+=`<p>${f}</p>`;
    }else{
      const end=parts[i].indexOf('###ENDCHART###');
      if(end>-1){
        const id='chart_'+Date.now()+'_'+i;
        try{const cd=JSON.parse(parts[i].substring(0,end));html+=`<div class="chart-container"><div class="chart-title">${cd.title||'GRÁFICO'}</div><canvas id="${id}" height="200"></canvas></div>`;window._pc=window._pc||{};window._pc[id]=cd;}catch(e){}
      }
    }
  }
  return html;
}

function renderCharts(){
  if(!window._pc)return;
  const colors=['#e8c547','#5b9bd5','#4caf7d','#e05c4b','#9b7fd4','#e8834a','#4abfcc','#d4a843'];
  for(const[id,data]of Object.entries(window._pc)){
    const canvas=document.getElementById(id);if(!canvas)continue;
    if(chartInstances[id])chartInstances[id].destroy();
    chartInstances[id]=new Chart(canvas,{type:data.type||'bar',data:{labels:data.labels,datasets:data.datasets.map((ds,i)=>({...ds,backgroundColor:colors[i%colors.length]+'99',borderColor:colors[i%colors.length],borderWidth:1.5,borderRadius:4}))},options:{responsive:true,plugins:{legend:{labels:{color:'#9a9690',font:{family:'DM Mono',size:11}}}},scales:{x:{ticks:{color:'#5a5752',font:{family:'DM Mono',size:11}},grid:{color:'#2e2c29'}},y:{ticks:{color:'#5a5752',font:{family:'DM Mono',size:11}},grid:{color:'#2e2c29'}}}}});
  }
  window._pc={};
}

function addMsg(role,content,isHtml=false){
  const w=document.getElementById('welcome');if(w)w.remove();
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');div.className=`message ${role}`;
  const av=document.createElement('div');av.className=`avatar ${role==='user'?'user-av':'ai'}`;av.textContent=role==='user'?'vc':'D';
  const b=document.createElement('div');b.className='bubble';
  if(isHtml)b.innerHTML=content;else b.textContent=content;
  div.appendChild(av);div.appendChild(b);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function addThinking(){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');div.className='message';div.id='thinking';
  const av=document.createElement('div');av.className='avatar ai';av.textContent='D';
  const b=document.createElement('div');b.className='bubble thinking';
  b.innerHTML='<div class="thinking-dots"><span></span><span></span><span></span></div><span>analisando dados...</span>';
  div.appendChild(av);div.appendChild(b);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function removeThinking(){const t=document.getElementById('thinking');if(t)t.remove();}

async function sendMessage(){
  if(isLoading)return;
  const input=document.getElementById('userInput');
  const pergunta=input.value.trim();if(!pergunta)return;
  input.value='';input.style.height='auto';
  isLoading=true;document.getElementById('sendBtn').disabled=true;
  addMsg('user',pergunta);addThinking();
  try{
    const dados=await getDados(pergunta);
    const resposta=await askClaude(pergunta,dados);
    removeThinking();
    const filialNome=selectedFilial==='all'?'TODAS AS FILIAIS':FILIAIS[selectedFilial].nome.toUpperCase();
    addMsg('ai',renderResponse(resposta,filialNome),true);
    setTimeout(renderCharts,100);
  }catch(err){removeThinking();addMsg('ai',`Erro: ${err.message}`);}
  isLoading=false;document.getElementById('sendBtn').disabled=false;
}

function sendSuggestion(text){document.getElementById('userInput').value=text;sendMessage();}
</script>
